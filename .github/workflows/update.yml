name: Update EPG JSON

on:
  schedule:
    - cron: "0 */1 * * *"   # ogni 6 ore
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run converter
        run: node convert.js

      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output.json
          git commit -m "auto update EPG" || exit 0
          git push
