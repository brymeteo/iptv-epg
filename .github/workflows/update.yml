name: Update EPG JSON

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run converter
        run: node convert.js

      - name: Commit output
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output.json
          git commit -m "auto update epg" || echo "no changes"
          git push
